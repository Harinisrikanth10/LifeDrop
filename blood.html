<!DOCTYPE html>
<html>
<head>
<title>Blood Donor Registration</title>

<style>
body{
    font-family: Arial, sans-serif;
    background: #fff8e7; /* Cream */
    margin: 0;
    padding: 20px;
}

.container{
    width: 500px;
    margin: auto;
    background: #fffaf0;
    padding: 25px;
    border-radius: 15px;
    box-shadow: 0 0 15px rgba(139,0,0,0.3);
    border-top: 8px solid #8B0000;
}

.app-header{
    text-align:center;
    margin-bottom:20px;
}

.logo{
    width:100px;
    height:100px;
    border-radius:50%;
    object-fit:cover;
    border:3px solid #8B0000;
}

.app-header h1{
    color:#8B0000;
    margin-top:10px;
    margin-bottom:5px;
    font-size:32px;
}

h2{
    text-align: center;
    color: #8B0000;
    margin-bottom: 20px;
}

label{
    font-weight: bold;
    color: #8B0000;
}

input,
select,
textarea{
    width: 100%;
    padding: 10px;
    margin: 8px 0 15px;
    border: 1px solid #d4b996;
    border-radius: 5px;
    box-sizing: border-box;
    background-color: #fffdf7;
}

input:focus,
select:focus,
textarea:focus{
    outline: none;
    border-color: #8B0000;
}

button{
    width: 100%;
    padding: 12px;
    background: #8B0000;
    color: white;
    border: none;
    border-radius: 5px;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
}

button:hover{
    background: #b22222;
}
</style>

</head>
<body>

<div class="container">
    <div class="app-header">
    <img src="C:\Users\Sarvesh\Downloads\logo1.jpeg" alt="Blood Donation App Logo" class="logo">
    <h1>LifeDrop</h1>
    </div>

    <h2>🩸 Blood Donor Registration Form</h2>

    <form>
        <label>Full Name</label>
        <input type="text" required>

        <label>Age</label>
        <input type="number" required>

        <label>Gender</label>
        <select required>
            <option>Select Gender</option>
            <option>Male</option>
            <option>Female</option>
            <option>Other</option>
        </select>

        <label>Blood Group</label>
        <select required>
            <option>Select Blood Group</option>
            <option>A+</option>
            <option>A-</option>
            <option>B+</option>
            <option>B-</option>
            <option>AB+</option>
            <option>AB-</option>
            <option>O+</option>
            <option>O-</option>
        </select>

        <label>Date of Birth</label>
        <input type="date">

        <label>Mobile Number</label>
        <input type="tel">

        <label>Email ID</label>
        <input type="email">

        <label>Address</label>
        <textarea rows="3"></textarea>

        <label>City</label>
        <input type="text">

        <label>State</label>
        <input type="text">

        <label>Weight (kg)</label>
        <input type="number">

        <label>Last Donation Date</label>
        <input type="date">

        <label>Medical Conditions</label>
        <textarea rows="2"></textarea>

        <label>Available to Donate</label>
        <select>
            <option>Yes</option>
            <option>No</option>
        </select>

        <label>Emergency Contact Number</label>
        <input type="tel">

        <button type="submit">Register Donor</button>
    </form>
</div>

</body>
</html>
